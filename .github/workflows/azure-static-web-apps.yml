name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Matching Game dependencies
        working-directory: "Matching Game Code/project"
        run: npm ci

      - name: Build Matching Game
        working-directory: "Matching Game Code/project"
        env:
          VITE_SUPABASE_URL: https://dpexwkowhohdbewmsyno.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwZXh3a293aG9oZGJld21zeW5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTc0NjksImV4cCI6MjA5MTgzMzQ2OX0.cnVo3zGCWBydS2xe4Vk8RbYfqDRnApLuj5YwZZPNZ-s
        run: npm run build

      - name: Assemble dist
        run: |
          mkdir -p dist/matching-game
          cp index.html dist/
          cp staticwebapp.config.json dist/
          cp "D logo.png" dist/ || true
          cp -r "Matching Game Code/project/dist/"* dist/matching-game/

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/dist"
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
