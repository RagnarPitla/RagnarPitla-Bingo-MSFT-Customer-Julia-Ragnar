name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Matching Game dependencies
        working-directory: "Matching Game Code/project"
        run: npm ci

      - name: Build Matching Game
        working-directory: "Matching Game Code/project"
        env:
          VITE_SUPABASE_URL: https://dpexwkowhohdbewmsyno.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwZXh3a293aG9oZGJld21zeW5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTc0NjksImV4cCI6MjA5MTgzMzQ2OX0.cnVo3zGCWBydS2xe4Vk8RbYfqDRnApLuj5YwZZPNZ-s
        run: npm run build

      - name: Assemble dist
        run: |
          mkdir -p dist/matching-game
          cp index.html dist/
          cp staticwebapp.config.json dist/
          cp "D logo.png" dist/ || true
          cp -r "Matching Game Code/project/dist/"* dist/matching-game/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
